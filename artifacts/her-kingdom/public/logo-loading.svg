<svg xmlns="http://www.w3.org/2000/svg" width="360" height="80" viewBox="0 0 360 80" role="img" aria-label="Shaniid RX loading">
  <defs>
    <linearGradient id="g" x1="0" x2="1">
      <stop offset="0%" stop-color="#F97316"/>
      <stop offset="100%" stop-color="#B91C1C"/>
    </linearGradient>
  </defs>
  <rect width="100%" height="100%" fill="none"/>
  <!-- Logo text -->
  <g transform="translate(8,18)">
    <text x="0" y="28" font-family="Georgia, 'Times New Roman', serif" font-size="28" font-weight="700" fill="#3D0814">Shaniid</text>
    <text x="0" y="56" font-family="Georgia, 'Times New Roman', serif" font-size="28" font-weight="700" fill="#3D0814">RX</text>
  </g>

  <!-- Loading pill -->
  <g transform="translate(170,28)">
    <rect x="0" y="6" rx="14" ry="14" width="164" height="36" fill="#FFF6EE" stroke="#F2DCC8"/>
    <text x="12" y="32" font-family="Inter, Arial, sans-serif" font-size="14" font-weight="700" fill="#3D0814">Loading</text>
    <!-- animated dots -->
    <g transform="translate(96,22)">
      <circle cx="0" cy="0" r="4" fill="url(#g)">
        <animate attributeName="opacity" values="0.15;1;0.15" dur="1s" repeatCount="indefinite" begin="0s"/>
      </circle>
      <circle cx="16" cy="0" r="4" fill="url(#g)">
        <animate attributeName="opacity" values="0.15;1;0.15" dur="1s" repeatCount="indefinite" begin="0.15s"/>
      </circle>
      <circle cx="32" cy="0" r="4" fill="url(#g)">
        <animate attributeName="opacity" values="0.15;1;0.15" dur="1s" repeatCount="indefinite" begin="0.3s"/>
      </circle>
    </g>
  </g>
</svg>