kind = "web"
previewPath = "/"
title = "Her Kingdom"
version = "1.0.0"
id = "artifacts/her-kingdom"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 21470

[services.development]
run = "pnpm --filter @workspace/her-kingdom run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/her-kingdom", "run", "build" ]
publicDir = "artifacts/her-kingdom/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "21470"
BASE_PATH = "/"
